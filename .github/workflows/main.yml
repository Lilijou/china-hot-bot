name: Daily Hot Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py

      - name: Show generated files
        run: ls -al

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hot-report
          path: "*.txt"
