name: Daily Hot Bot

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests

      - run: python main.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: hot-report
          path: "*.txt"
